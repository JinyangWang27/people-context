name: Apply PR 26 review fixes on PR update

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/m7-graph-and-vault-6vdtgf
          fetch-depth: 0

      - name: Apply fail-closed corrections
        run: python .github/pr26-fix.py

      - name: Remove one-off helpers before validation
        run: |
          rm .github/pr26-fix.py
          rm .github/pr26-third-review-trigger
          rm .github/workflows/pr26-third-review-fixes.yml
          rm .github/workflows/pr26-doc-fixes-pr.yml

      - uses: astral-sh/setup-uv@v6

      - name: Validate
        run: |
          uv run ruff check .
          uv run pytest -q

      - name: Commit corrected docs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: address second PR 26 review"
          git push origin HEAD:claude/m7-graph-and-vault-6vdtgf
