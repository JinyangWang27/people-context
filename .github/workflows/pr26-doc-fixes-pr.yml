name: Apply final PR 26 architecture repair

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/m7-graph-and-vault-6vdtgf
          fetch-depth: 0

      - name: Apply fail-closed architecture corrections
        run: python .github/pr26-final-architecture-fix.py

      - name: Remove one-off repair helpers before validation
        run: |
          rm -f \
            .github/pr26-final-architecture-fix.py \
            .github/pr26-final-architecture-trigger \
            .github/workflows/pr26-doc-fixes-pr.yml

      - uses: astral-sh/setup-uv@v6

      - name: Validate final repository state
        run: |
          git diff --check
          ! grep -R "Sensitivity mirrors vault export exactly" docs/specs
          ! grep -R "no new port needed if existing readers suffice" docs/specs
          uv run ruff check .
          uv run pytest -q

      - name: Commit and push final architecture repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: close remaining M8-M15 architecture gaps"
          git push origin HEAD:claude/m7-graph-and-vault-6vdtgf
